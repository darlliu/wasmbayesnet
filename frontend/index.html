<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasmBayesNet - Interactive Bayesian Network Builder</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">📊</span>
            <h1>WasmBayesNet</h1>
        </div>
        <div class="controls">
            <button id="btn-add-node" class="btn primary">Add Node</button>
            <button id="btn-clear" class="btn secondary">Clear Canvas</button>
            <div class="engine-status">
                <div id="wasm-indicator" class="indicator checking"></div>
                <span id="wasm-text">Loading WASM Engine...</span>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="workspace">
        <!-- SVG Canvas for D3.js -->
        <div class="canvas-container">
            <svg id="network-canvas"></svg>
        </div>

        <!-- Floating UI Panel (Glassmorphism) -->
        <aside id="properties-panel" class="panel hidden">
            <div class="panel-header">
                <h2 id="panel-title">Node Properties</h2>
                <button id="btn-close-panel" class="btn-icon">✕</button>
            </div>
            <div class="panel-content">
                <div class="empty-state" id="panel-empty">
                    Select a node to edit its probabilities or set evidence.
                </div>
                
                <div id="panel-editor" class="hidden">
                    <h3 id="edit-node-name">Variable name</h3>
                    
                    <div class="section">
                        <h4>Evidence (Observation)</h4>
                        <div class="toggle-group" id="evidence-controls">
                            <button class="toggle-btn" data-state="none">Unknown</button>
                            <button class="toggle-btn" data-state="0">True</button>
                            <button class="toggle-btn" data-state="1">False</button>
                        </div>
                    </div>

                    <div class="section">
                        <h4>Marginal Probabilities</h4>
                        <div class="progress-bar-container">
                            <div class="progress-label"><span>True</span> <span id="prob-true-pct">--%</span></div>
                            <div class="progress-track"><div id="prob-true-bar" class="progress-fill true-color" style="width: 0%"></div></div>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-label"><span>False</span> <span id="prob-false-pct">--%</span></div>
                            <div class="progress-track"><div id="prob-false-bar" class="progress-fill false-color" style="width: 0%"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- D3.js from CDN (Zero local dependencies!) -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- WASM Module loading and App Logic -->
    <script src="engine.js"></script> <!-- Will be generated by Emscripten -->
    <script type="module" src="app.js"></script>
</body>
</html>
